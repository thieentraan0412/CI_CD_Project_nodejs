name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: CI – Install dependencies & run tests
  # ─────────────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────
  # JOB 2: CD – Deploy to Render (only on push to main)
  # ─────────────────────────────────────────────
  cd:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci                   # Only runs after CI passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret is not set – skipping deploy."
            echo "   Add it at: GitHub repo → Settings → Secrets → RENDER_DEPLOY_HOOK_URL"
            exit 0
          fi
          echo "🚀 Triggering Render deploy..."
          curl -X POST "$DEPLOY_HOOK" \
            --fail \
            -o /dev/null \
            -s
          echo "✅ Deploy triggered successfully!"
        # To set up: Render Dashboard → Your Service → Settings → Deploy Hook
        # Copy the URL and add it as a GitHub Secret: RENDER_DEPLOY_HOOK_URL
